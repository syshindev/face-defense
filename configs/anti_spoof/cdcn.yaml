# CDCN (Central Difference Convolutional Network) configuration
model:
  name: "cdcn"
  input_size: [256, 256]
  threshold: 0.5

weights:
  checkpoint: "${project_root}/weights/cdcn/cdcn_best.pth"

training:
  epochs: 50
  lr: 0.0001
  batch_size: 32
  optimizer: "adam"
  scheduler: "cosine"

inference:
  batch_size: 1
  device: "cuda:0"
