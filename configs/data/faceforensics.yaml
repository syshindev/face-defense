# FaceForensics++ deepfake dataset configuration
dataset:
  name: "faceforensics"
  root: "${project_root}/data/raw/FaceForensics"
  processed: "${project_root}/data/processed/faceforensics"
  compression: "c23"
  methods: ["Deepfakes", "Face2Face", "FaceSwap", "NeuralTextures"]

preprocessing:
  face_detector: "retinaface"
  face_size: 256
  frames_per_video: 32

loader:
  batch_size: 32
  num_workers: 4
  pin_memory: true
