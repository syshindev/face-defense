# OULU-NPU anti-spoofing dataset configuration
dataset:
  name: "oulu_npu"
  root: "${project_root}/data/raw/OULU-NPU"
  processed: "${project_root}/data/processed/oulu_npu"
  protocol: 1

preprocessing:
  face_detector: "retinaface"
  face_size: 256
  margin: 0.3

loader:
  batch_size: 32
  num_workers: 4
  pin_memory: true
