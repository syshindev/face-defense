# EfficientNet-B4 deepfake detector configuration
model:
  name: "efficientnet"
  variant: "efficientnet_b4"
  num_classes: 2
  input_size: [380, 380]
  threshold: 0.5

weights:
  checkpoint: "${project_root}/weights/deepfake/efficientnet_b4_best.pth"

training:
  epochs: 30
  lr: 0.0001
  batch_size: 16
  optimizer: "adam"
  scheduler: "cosine"

inference:
  batch_size: 1
  device: "cuda:0"
